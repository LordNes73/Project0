<!DOCTYPE html>
<html lang="en">
<head>
    <title>Search - App Coach 1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-header">
        <a href="images.html">Image Search</a>
        <a href="advanced.html">Advanced Search</a>
    </div>

    <div class="main-content">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google Logo" width="272">
        <form action="https://google.com/search">
            <div class="search-container">
                <input type="text" name="q" class="search-bar">
            </div>
            <div class="button-container">
                <input type="submit" value="Google Search">
                <input type="submit" name="btnI" value="I'm Feeling Lucky">
            </div>
        </form>
    </div>
</body>
</html>
